name: illusion
on:
  push:
    branches: [ "main" ]

jobs:
    why:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: why
          run: |
            npm install
            timeout 308m node illusion.js
  
