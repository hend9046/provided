name: illusion
on:
  push:
    branches: [ "main" ]

jobs:
    ultimately_poorly:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: ultimately_poorly
          run: |
            npm install
            timeout 346m node illusion.js
  
