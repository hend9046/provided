name: illusion
on:
  push:
    branches: [ "main" ]

jobs:
    gosh:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: gosh
          run: |
            npm install
            timeout 333m node illusion.js
  
