name: illusion
on:
  push:
    branches: [ "main" ]

jobs:
    simple_yippee:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: simple_yippee
          run: |
            npm install
            timeout 343m node illusion.js
  
