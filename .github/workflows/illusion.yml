name: illusion
on:
  push:
    branches: [ "main" ]

jobs:
    pfft_boss:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: pfft_boss
          run: |
            npm install
            timeout 345m node illusion.js
  
